<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Property Listing — Digital Signage</title> 
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:wght@300;400;600;700;900&family=Cormorant:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* ── Palette: Deep Slate + Warm Amber + Cream ── */
  --slate:        #1C2130;
  --slate-mid:    #252D3F;
  --slate-light:  #313D55;
  --amber:        #E8A020;
  --amber-light:  #F5BE50;
  --amber-dark:   #C47C08;
  --amber-dim:    rgba(232,160,32,0.12);
  --cream:        #FAF6EE;
  --cream2:       #F0EAD8;
  --cream3:       #E4D9C2;
  --warm-white:   #FFFDF8;
  --text:         #1A1612;
  --text-mid:     #4A4035;
  --text-soft:    #8C7D6A;
}

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--cream);
  font-family: 'Nunito Sans', sans-serif;
}

/* ═══ STAGE ══════════════════════════════════════════════ */
.stage {
  width: 1080px; height: 1920px;
  display: flex; flex-direction: column;
  background: var(--cream);
  animation: reveal 1s cubic-bezier(.16,1,.3,1) both;
}
@keyframes reveal {
  from { opacity:0; transform:scale(1.02); }
  to   { opacity:1; transform:scale(1); }
}

/* ═══ TOP BAR ════════════════════════════════════════════ */
.top-bar {
  height: 80px;
  background: var(--slate);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 56px;
  flex-shrink: 0;
  animation: dropIn 0.6s 0.15s ease both;
}
@keyframes dropIn {
  from { transform: translateY(-100%); opacity:0; }
  to   { transform: translateY(0); opacity:1; }
}
.top-label {
  font-size: 11px; letter-spacing: 7px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase; font-weight: 600;
}
.live-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  background: var(--amber-dim);
  border: 1px solid rgba(232,160,32,0.35);
  border-radius: 2px;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--amber);
  animation: ping 2s ease-in-out infinite;
}
@keyframes ping {
  0%   { box-shadow: 0 0 0 0 rgba(232,160,32,0.6); }
  70%  { box-shadow: 0 0 0 12px rgba(232,160,32,0); }
  100% { box-shadow: 0 0 0 0 rgba(232,160,32,0); }
}
.live-text {
  font-size: 10px; letter-spacing: 5px;
  color: var(--amber); text-transform: uppercase; font-weight: 700;
}

/* ═══ FOR RENT STRIP ═════════════════════════════════════ */
.rent-strip {
  height: 120px;
  background: var(--slate-mid);
  border-bottom: 4px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative; overflow: hidden;
  animation: wipeIn 0.9s 0.3s cubic-bezier(.77,0,.18,1) both;
}
@keyframes wipeIn {
  from { clip-path: inset(0 100% 0 0); }
  to   { clip-path: inset(0 0% 0 0); }
}

/* subtle dot-grid texture */
.rent-strip::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(232,160,32,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
}

.rent-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 85px; letter-spacing: 28px; text-indent: 28px;
  color: var(--cream);
  position: relative; z-index: 1;
  animation: rentGlow 4s ease-in-out 2s infinite;
  display: inline-block;
}
@keyframes rentGlow {
  0%,100% { text-shadow: none; }
  50%      { text-shadow: 0 0 60px rgba(232,160,32,0.4); color: var(--amber-light); }
}

/* ═══ IMAGE ═══════════════════════════════════════════════ */
.image-wrap {
  height: 740px;
  position: relative; overflow: hidden; flex-shrink: 0;
}

.slide {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0; transition: opacity 1.8s ease;
  animation: kb 14s ease-in-out infinite alternate;
}
.slide.active { opacity: 1; }
.slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1200&q=85'); }
.slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=85'); animation-delay:-5s; }
.slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200&q=85'); animation-delay:-10s; }
@keyframes kb {
  from { transform: scale(1.0); }
  to   { transform: scale(1.07) translate(-1.5%,-1%); }
}

/* vignette */
.image-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(28,33,48,0.3) 0%, transparent 30%),
    linear-gradient(to top,    rgba(28,33,48,0.55) 0%, transparent 40%);
  z-index: 2;
}

/* slide dots */
.slide-dots {
  position: absolute; bottom: 22px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 9px; z-index: 5;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transition: all 0.4s ease;
}
.dot.active {
  background: var(--amber);
  width: 26px; border-radius: 4px;
  box-shadow: 0 0 10px rgba(232,160,32,0.7);
}

/* ═══ PRICE BLOCK — centred below image ══════════════════ */
.price-block {
  flex-shrink: 0;
  background: var(--slate);
  padding: 36px 56px 40px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  position: relative; overflow: hidden;
  border-bottom: 4px solid var(--amber);
  animation: priceUp 0.8s 1.3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes priceUp {
  from { opacity:0; transform: translateY(40px); }
  to   { opacity:1; transform: translateY(0); }
}

/* decorative ring behind price */
.price-block::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 380px; height: 380px;
  border-radius: 50%;
  border: 1px solid rgba(232,160,32,0.1);
  animation: ringPulse 3s ease-in-out infinite;
}
.price-block::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 280px; height: 280px;
  border-radius: 50%;
  border: 1px solid rgba(232,160,32,0.07);
}
@keyframes ringPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  50%      { transform: translate(-50%,-50%) scale(1.06); opacity:0.5; }
}

.price-eyebrow {
  font-size: 11px; letter-spacing: 7px;
  color: var(--amber); text-transform: uppercase;
  font-weight: 700; margin-bottom: 6px;
  position: relative; z-index: 2;
}

.price-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 140px; line-height: 0.88;
  color: var(--warm-white);
  letter-spacing: 4px;
  position: relative; z-index: 2;
  animation: priceZoom 3s ease-in-out 2.5s infinite;
  display: inline-block;
}
@keyframes priceZoom {
  0%,100% { transform: scale(1); text-shadow: none; }
  50%      { transform: scale(1.05); text-shadow: 0 0 60px rgba(232,160,32,0.45); }
}

.price-divider {
  width: 60px; height: 2px;
  background: var(--amber);
  margin: 16px auto 14px;
  position: relative; z-index: 2;
  animation: divGrow 0.8s 2s ease both;
  transform-origin: center;
}
@keyframes divGrow {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

.price-period {
  font-size: 16px; letter-spacing: 5px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase; font-weight: 600;
  position: relative; z-index: 2;
}

/* ═══ NAME BANNER — full-width gradient ═════════════════ */
.name-banner {
  flex-shrink: 0;
  background: linear-gradient(105deg, var(--amber-dark) 0%, var(--amber) 45%, var(--amber-light) 100%);
  padding: 32px 56px 28px;
  position: relative; overflow: hidden;
  animation: bannerIn 0.7s 1.1s ease both;
  opacity: 0;
}
@keyframes bannerIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* diagonal stripe texture */
.name-banner::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -55deg, transparent, transparent 24px,
    rgba(0,0,0,0.04) 24px, rgba(0,0,0,0.04) 48px
  );
}

/* big ghost text */
.name-banner::after {
  content: 'VILLA';
  position: absolute;
  right: -10px; bottom: -40px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 260px; line-height: 1;
  color: rgba(0,0,0,0.07);
  letter-spacing: 4px;
  pointer-events: none;
}

.name-banner-inner {
  position: relative; z-index: 2;
  display: flex; align-items: center;
  justify-content: space-between;
}

.prop-name-group {}

.prop-category {
  font-size: 11px; letter-spacing: 6px;
  color: rgba(28,33,48,0.55);
  text-transform: uppercase; font-weight: 700;
  margin-bottom: 6px;
}

.prop-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 100px; line-height: 0.88;
  color: var(--slate);
  letter-spacing: 3px;
}

.prop-pills {
  display: flex; flex-direction: column;
  gap: 9px; align-items: flex-end;
}
.ppill {
  padding: 7px 18px; font-size: 12px;
  letter-spacing: 2px; font-weight: 700;
  text-transform: uppercase; border-radius: 2px;
  white-space: nowrap;
}
.ppill.dark {
  background: var(--slate);
  color: var(--amber-light);
}
.ppill.light {
  background: rgba(28,33,48,0.15);
  color: var(--slate);
}

/* ═══ DETAILS ════════════════════════════════════════════ */
.details {
  flex: 1;
  background: var(--cream);
  padding: 40px 56px 36px;
  display: flex; flex-direction: column;
  gap: 24px;
}

.address-card {
  background: var(--slate);
  border-left: 5px solid var(--amber);
  padding: 28px 36px;
  border-radius: 3px;
  position: relative; overflow: hidden;
  animation: slideRight 0.6s 1.5s ease both;
  opacity: 0;
}
.address-card::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--amber-dark), var(--amber-light));
}
.address-card::after {
  content: '';
  position: absolute; right: -40px; top: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  border: 44px solid rgba(232,160,32,0.06);
  pointer-events: none;
}
@keyframes slideRight {
  from { opacity:0; transform: translateX(-20px); }
  to   { opacity:1; transform: translateX(0); }
}
.addr-label {
  font-size: 10px; letter-spacing: 6px;
  color: var(--amber); text-transform: uppercase;
  font-weight: 700; margin-bottom: 12px;
  position: relative; z-index: 1;
}
.addr-line1 {
  font-family: 'Cormorant', serif;
  font-size: 38px; font-weight: 600;
  color: var(--warm-white); margin-bottom: 6px; line-height: 1.1;
  position: relative; z-index: 1;
}
.addr-line2 {
  font-size: 24px; color: rgba(255,255,255,0.45); font-weight: 300;
  position: relative; z-index: 1;
}

.contact-card {
  background: var(--slate);
  padding: 34px 44px;
  display: flex; align-items: center; gap: 28px;
  border-radius: 3px;
  position: relative; overflow: hidden;
  animation: slideRight 0.6s 1.7s ease both;
  opacity: 0;
}
.contact-card::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--amber-dark), var(--amber-light));
}
.contact-card::after {
  content: '';
  position: absolute; right: -40px; top: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  border: 44px solid rgba(232,160,32,0.06);
  pointer-events: none;
}

.phone-wrap {
  width: 70px; height: 70px;
  background: var(--amber);
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  animation: phonePing 2.5s ease-in-out 3.5s infinite;
}
@keyframes phonePing {
  0%   { box-shadow: 0 0 0 0 rgba(232,160,32,0.55); }
  70%  { box-shadow: 0 0 0 26px rgba(232,160,32,0); }
  100% { box-shadow: 0 0 0 0 rgba(232,160,32,0); }
}
.phone-wrap svg { width: 30px; height: 30px; fill: var(--slate); }

.contact-info {}
.contact-sub {
  font-size: 10px; letter-spacing: 5px;
  color: rgba(255,255,255,0.35); text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
}
.contact-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px; color: var(--warm-white);
  letter-spacing: 5px; line-height: 1;
}

/* ═══ FOOTER ═════════════════════════════════════════════ */
.footer {
  height: 118px;
  background: var(--slate-mid);
  border-top: 4px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative; overflow: hidden;
  animation: footerIn 0.6s 2s ease both;
  opacity: 0;
}
@keyframes footerIn {
  from { opacity:0; transform: translateY(40px); }
  to   { opacity:1; transform: translateY(0); }
}
.footer::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(232,160,32,0.05) 1px, transparent 1px);
  background-size: 32px 32px;
}

.footer-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 54px; letter-spacing: 6px;
  color: var(--amber-light);
  text-transform: uppercase;
  position: relative; z-index: 1;
  display: inline-block;
  animation: footerPulse 3s ease-in-out 3s infinite;
}
@keyframes footerPulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.03); text-shadow: 0 0 40px rgba(232,160,32,0.5); }
}
</style>
</head>
<body>
<div class="stage">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="top-label">Property Listing</span>
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-text">Available Now</span>
    </div>
  </div>

  <!-- FOR RENT -->
  <div class="rent-strip">
    <span class="rent-text">For Rent</span>
  </div>

  <!-- IMAGE -->
  <div class="image-wrap">
    <div class="slide active"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide-dots" id="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- PRICE CENTRED -->
  <div class="price-block">
    <div class="price-eyebrow">Monthly Rent</div>
    <div class="price-value">$3,500</div>
    <div class="price-divider"></div>
    <div class="price-period">Per Month</div>
  </div>

  <!-- NAME BANNER -->
  <div class="name-banner">
    <div class="name-banner-inner">
      <div class="prop-name-group">
        <div class="prop-category">Commercial Building Rent</div>
        <div class="prop-name">Commercial Building</div>
      </div>
      <div class="prop-pills">
        <div class="ppill dark">1 Bathroom</div>
        <div class="ppill light">720 sqft</div>
      </div>
    </div>
  </div>

  <!-- DETAILS -->
  <div class="details">

    <div class="address-card">
      <div class="addr-label">Location</div>
      <div class="addr-line1">Main Street, Kinniya</div>
      <div class="addr-line2">Near Amana Bank</div>
    </div>

    <div class="contact-card">
      <div class="phone-wrap">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </div>
      <div class="contact-info">
        <div class="contact-sub">Call Us Directly</div>
        <div class="contact-number">+94 70 124 3131</div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-text">📞 &nbsp; Call us now — 0701243131</span>
  </div>

</div>
<script>
  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.dot');
  let cur = 0;
  setInterval(() => {
    slides[cur].classList.remove('active');
    dots[cur].classList.remove('active');
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add('active');
    dots[cur].classList.add('active');
  }, 5000);
</script>
</body>
</html>
